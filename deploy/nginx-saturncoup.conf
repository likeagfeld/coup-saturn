server {
    listen 80;
    server_name saturncoup.duckdns.org;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name saturncoup.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/saturncoup.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/saturncoup.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /opt/coup-server/web;
    index index.html;

    # Static web files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # JS/CSS - short cache to pick up updates quickly
    location ~* \.(?:js|css)$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    # Game assets (PNG/MP3/OGG/MP4) - cache for 7 days
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket proxy to coup-server
    location /ws {
        proxy_pass http://127.0.0.1:4823;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
